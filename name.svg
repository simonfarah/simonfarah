<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 800 100" height="100">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				@keyframes gradient {
					0% {
						background-position: 0% 50%;
					}

					50% {
						background-position: 100% 50%;
					}

					100% {
						background-position: 0% 50%;
					}
				}

				h1 {
					font-family: 'Inter', -apple-system, BlinkMacSystemFont,  'Segoe UI',  'Roboto',  'Oxygen',  'Ubuntu',  'Cantarell',  'Fira Sans',  'Droid Sans',  'Helvetica Neue',  sans-serif;
					font-size: 4em;
					font-weight: 900;
					letter-spacing: -.05em;
					text-align: center;
					color: transparent;
					-webkit-text-fill-color: transparent;

					margin: 0;
					padding: 0;

					background: linear-gradient(to right, rgb(129, 140, 248), rgb(253, 164, 175));
					background: -webkit-linear-gradient(to right, rgb(129, 140, 248), rgb(253, 164, 175));
					background-size: 200%;
					background-clip: text;
					-webkit-background-clip: text;
					
					animation: gradient 3s ease infinite;
					-webkit-animation: gradient 3s ease infinite;
				}
			</style>

			<h1>Simon Farah</h1>
		</div>
	</foreignObject>
</svg>